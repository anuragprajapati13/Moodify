<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Avatar - Moodify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top bar -->
  <nav class="avatar-nav">
    <a href="../index.html" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Moodify
    </a>
    <h1 class="nav-title">🎨 Create Your Avatar</h1>
    <div class="nav-spacer"></div>
  </nav>

  <div class="avatar-builder">

    <!-- Live Preview -->
    <div class="preview-section">
      <div class="preview-card">
        <h2>Your Avatar</h2>
        <div class="avatar-preview" id="avatarPreview">
          <svg id="avatarSVG" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div class="preview-actions">
          <button class="btn btn-random" onclick="randomAvatar()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
            Random
          </button>
          <button class="btn btn-reset" onclick="resetAvatar()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
            Reset
          </button>
          <button class="btn btn-save" onclick="saveAvatar()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save Avatar
          </button>
          <button class="btn btn-download" onclick="downloadAvatar()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download PNG
          </button>
        </div>
        <div id="saveStatus" class="save-status"></div>
      </div>
    </div>

    <!-- Customization Options -->
    <div class="options-section">

      <!-- Face Shape -->
      <div class="option-group">
        <h3>Face Shape</h3>
        <div class="option-grid" id="faceOptions"></div>
      </div>

      <!-- Skin Tone -->
      <div class="option-group">
        <h3>Skin Tone</h3>
        <div class="color-row" id="skinOptions"></div>
      </div>

      <!-- Hair Style -->
      <div class="option-group">
        <h3>Hair Style</h3>
        <div class="option-grid" id="hairOptions"></div>
      </div>

      <!-- Hair Color -->
      <div class="option-group">
        <h3>Hair Color</h3>
        <div class="color-row" id="hairColorOptions"></div>
      </div>

      <!-- Eyes -->
      <div class="option-group">
        <h3>Eyes</h3>
        <div class="option-grid" id="eyeOptions"></div>
      </div>

      <!-- Eye Color -->
      <div class="option-group">
        <h3>Eye Color</h3>
        <div class="color-row" id="eyeColorOptions"></div>
      </div>

      <!-- Eyebrows -->
      <div class="option-group">
        <h3>Eyebrows</h3>
        <div class="option-grid" id="eyebrowOptions"></div>
      </div>

      <!-- Mouth -->
      <div class="option-group">
        <h3>Mouth</h3>
        <div class="option-grid" id="mouthOptions"></div>
      </div>

      <!-- Facial Hair -->
      <div class="option-group">
        <h3>Facial Hair</h3>
        <div class="option-grid" id="facialHairOptions"></div>
      </div>

      <!-- Glasses -->
      <div class="option-group">
        <h3>Glasses</h3>
        <div class="option-grid" id="glassesOptions"></div>
      </div>

      <!-- Headphones -->
      <div class="option-group">
        <h3>🎧 Headphones</h3>
        <div class="option-grid" id="headphoneOptions"></div>
      </div>

      <!-- Accessories -->
      <div class="option-group">
        <h3>Accessories</h3>
        <div class="option-grid" id="accessoryOptions"></div>
      </div>

      <!-- Background -->
      <div class="option-group">
        <h3>Background</h3>
        <div class="color-row" id="bgOptions"></div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
